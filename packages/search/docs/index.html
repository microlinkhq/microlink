  <noscript>
    <h1>@microlink/google</h1>
    <p>Turn Google results into structured, code-ready data. Powered by <a href="https://microlink.io">Microlink</a>.</p>
    <h2>Highlights</h2>
    <ul>
      <li><strong>10 Google verticals in one API</strong> — Search, News, Images, Videos, Places, Maps, Shopping, Scholar, Patents, and Autocomplete.</li>
      <li><strong>Normalized data</strong> — Prices, ratings, coordinates, and images returned in consistent structures.</li>
      <li><strong>Built for developers and LLMs</strong> — Lazy <code>.html()</code>/<code>.markdown()</code>, <code>.next()</code> pagination, parallelized requests (~1s latency).</li>
    </ul>
    <h2>Install</h2>
    <pre><code>npm install @microlink/google</code></pre>
    <p><a href="https://github.com/microlinkhq/google">View on GitHub</a></p>
  </noscript>
